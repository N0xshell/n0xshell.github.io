# ──────────────────────────────────────────────────────────────────────────────
# N0xshell — Jekyll/Chirpy configuration
# ──────────────────────────────────────────────────────────────────────────────
theme: jekyll-theme-chirpy
lang: en
timezone: Europe/Amsterdam

# ── SEO ───────────────────────────────────────────────────────────────────────
title: N0xshell
tagline: "HackTheBox · Malware Dev · Reversing"
description: >-
  HackTheBox machine writeups, malware development notes, and reverse engineering
  by N0xshell — sysadmin by day, hacker by night.
url: "https://n0xshell.github.io"
baseurl: ""

# ── Identity ──────────────────────────────────────────────────────────────────
github:
  username: N0xshell

social:
  name: N0xshell
  email: ""
  links:
    - https://github.com/N0xshell
    - https://app.hackthebox.com/users/N0xshell

# ── Appearance ────────────────────────────────────────────────────────────────
theme_mode: dark
avatar: /assets/img/Github-logov2.png
toc: true

# ── Analytics / SEO verifications (fill in when ready) ───────────────────────
webmaster_verifications:
  google:
  bing:
analytics:
  google:
    id:
  goatcounter:
    id:
pageviews:
  provider:

# ── Social preview ────────────────────────────────────────────────────────────
social_preview_image:   # /assets/img/preview.png when you have one

# ── Comments (disabled) ───────────────────────────────────────────────────────
comments:
  provider:

# ── Assets ────────────────────────────────────────────────────────────────────
assets:
  self_host:
    enabled:

# ── PWA ───────────────────────────────────────────────────────────────────────
pwa:
  enabled: true
  cache:
    enabled: true
    deny_paths:

# ── Pagination ────────────────────────────────────────────────────────────────
paginate: 10

# ──────────────────────────────────────────────────────────────────────────────
# Do not modify below unless you know what you're doing
# ──────────────────────────────────────────────────────────────────────────────
kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1
    theme: monokai

collections:
  tabs:
    output: true
    sort_by: order
  categories:
    output: true

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: false
      toc: true
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/
  - scope:
      path: ""
      type: categories
    values:
      layout: category
      permalink: /categories/:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - purgecss.js
  - "*.config.js"
  - "package*.json"
  - obsidian_to_jekyll.py
  - publish_note.sh
