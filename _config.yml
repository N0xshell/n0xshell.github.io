# The Site Configuration

# Import the theme
theme: jekyll-theme-chirpy

lang: en
timezone: Europe/Amsterdam

# ↓ --- SEO ---
title: N0xshell
tagline: "HackTheBox writeups & notes"
description: >-
  HTB machine writeups, pro lab reviews, and certification exam notes by N0xshell.

url: "https://n0xshell.github.io"

github:
  username: N0xshell

social:
  name: N0xshell
  email: ""
  links:
    - https://github.com/N0xshell
# ↑ --- SEO ---

# Verification — leave blank unless you need it
webmaster_verifications:
  google:
  bing:

# Analytics — optional, fill in if you use any
analytics:
  google:
    id:
  goatcounter:
    id:

pageviews:
  provider:

# Force dark mode — suits HTB aesthetic
theme_mode: dark

cdn:

# Sidebar avatar — place your image at /assets/img/avatar.png
avatar: /assets/img/hacker.png

social_preview_image:

toc: true

comments:
  provider: # leave blank to disable

assets:
  self_host:
    enabled:

pwa:
  enabled: true
  cache:
    enabled: true
    deny_paths:

paginate: 10

baseurl: ""

# ------------ Do not modify below unless you know what you're doing ------------------

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: false
      toc: true
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - purgecss.js
  - "*.config.js"
  - "package*.json"
  - obsidian_to_jekyll.py

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/